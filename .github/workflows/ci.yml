name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --check scripts/claude-design-opus.mjs
      - run: node --check scripts/smoke.mjs
      - run: npm test
      - run: npm pack --dry-run
